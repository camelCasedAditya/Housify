services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    # entrypoint.sh runs makemigrations + migrate because RUN_MIGRATIONS=1
    command: ["uvicorn", "ecc.asgi:application", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - DJANGO_SETTINGS_MODULE=ecc.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - RUN_MIGRATIONS=1
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: ./backend
    # No RUN_MIGRATIONS — backend handles schema; worker just consumes tasks.
    command: ["celery", "-A", "ecc", "worker", "-l", "info"]
    environment:
      - DJANGO_SETTINGS_MODULE=ecc.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend

  frontend:
    image: node:20-bookworm
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
